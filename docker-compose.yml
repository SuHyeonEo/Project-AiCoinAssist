services:
  spring-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-coin-assist-spring
    restart: unless-stopped
    environment:
      SERVER_PORT: 8082
      SPRING_APPLICATION_NAME: ai-coin-assist-server
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_CONNECTION_TIMEZONE: UTC
      FRED_API_KEY: ${FRED_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      EXTERNAL_OPENAI_ENABLED: ${EXTERNAL_OPENAI_ENABLED:-false}
      SPRINGDOC_API_DOCS_ENABLED: ${SPRINGDOC_API_DOCS_ENABLED:-false}
      SPRINGDOC_SWAGGER_UI_ENABLED: ${SPRINGDOC_SWAGGER_UI_ENABLED:-false}
      ADMIN_API_ENABLED: ${ADMIN_API_ENABLED:-false}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN:-}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
    expose:
      - "8082"

  nextjs:
    build:
      context: ../ai-coin-assist-frontend
      dockerfile: Dockerfile
    container_name: ai-coin-assist-nextjs
    restart: unless-stopped
    environment:
      PORT: 3000
      AICA_SERVER_BASE_URL: http://spring-server:8082
      NEXT_PUBLIC_SERVER_BASE_URL: ${NEXT_PUBLIC_SERVER_BASE_URL}
    depends_on:
      - spring-server
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: ai-coin-assist-nginx
    restart: unless-stopped
    depends_on:
      - spring-server
      - nextjs
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
