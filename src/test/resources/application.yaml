spring:
  datasource:
    url: jdbc:h2:mem:batch-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true

  task:
    scheduling:
      enabled: false

batch:
  admin-api:
    enabled: true
    token: test-admin-token
    header-name: X-Admin-Token
  analysis-report:
    engine-version: test-report-assembler
    asset-types:
      - BTC
    report-types:
      - SHORT_TERM
      - MID_TERM
      - LONG_TERM
    fixed-delay-ms: 300000
    manual-rerun:
      enabled: false
      source-run-id:
      shutdown-after-run: true
  scheduler:
    market-raw-ingestion:
      enabled: false
    analysis-report-generation:
      enabled: false

logging:
  level:
    root: warn

external:
  alternative-me:
    base-url: https://api.alternative.me
  coinmetrics:
    base-url: https://community-api.coinmetrics.io/v4
  fred:
    base-url: https://api.stlouisfed.org
    api-key: test-fred-api-key
    series:
      dxy-proxy: DTWEXBGS
      us10y-yield: DGS10
      usd-krw: DEXKOUS
