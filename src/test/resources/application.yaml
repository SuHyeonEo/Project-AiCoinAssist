spring:
  datasource:
    url: jdbc:h2:mem:batch-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true

  task:
    scheduling:
      enabled: false

batch:
  analysis-report:
    engine-version: test-report-assembler
    asset-types:
      - BTC
    report-types:
      - SHORT_TERM
      - MID_TERM
      - LONG_TERM
    fixed-delay-ms: 300000
  scheduler:
    market-raw-ingestion:
      enabled: false
    analysis-report-generation:
      enabled: false

logging:
  level:
    root: warn
