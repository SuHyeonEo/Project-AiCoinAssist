spring:
  application:
    name: batch

  datasource:
    url: jdbc:mysql://localhost:3306/coin_analysis?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    root: info

batch:
  admin-api:
    enabled: true
    token: ${ADMIN_API_TOKEN:}
    header-name: X-Admin-Token
  analysis-report:
    engine-version: report-assembler-v1
    asset-types:
      - BTC
      - ETH
      - XRP
    report-types:
      - SHORT_TERM
      - MID_TERM
      - LONG_TERM
    fixed-delay-ms: 300000
    manual-rerun:
      enabled: false
      source-run-id:
      shutdown-after-run: true
  scheduler:
    analysis-report-generation:
      enabled: true

external:
  binance:
    base-url: https://api.binance.com
