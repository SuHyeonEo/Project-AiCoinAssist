spring:
  application:
    name: batch

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:coin_analysis}?serverTimezone=${DB_TIMEZONE:Asia/Seoul}&characterEncoding=${DB_CHARACTER_ENCODING:UTF-8}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    root: info
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn

batch:
  admin-api:
    enabled: ${ADMIN_API_ENABLED:false}
    token: ${ADMIN_API_TOKEN:}
    header-name: X-Admin-Token
  llm-narrative:
    enabled: false
    provider: openai
    prompt-template-version: llm-prompt-v1
    input-schema-version: llm-input-v1
    output-schema-version: llm-output-v1
  analysis-report:
    engine-version: report-assembler-v1
    asset-types:
      - BTC
      - ETH
      - XRP
    report-types:
      - SHORT_TERM
      - MID_TERM
      - LONG_TERM
    fixed-delay-ms: 300000
    manual-rerun:
      enabled: false
      source-run-id:
      shutdown-after-run: true
  scheduler:
    market-raw-ingestion:
      enabled: true
      price-fixed-delay-ms: 60000
      candle-fixed-delay-ms: 600000
      candle-limit: 168
      four-hour-candle-limit: 180
      one-day-candle-limit: 364
    external-raw-ingestion:
      enabled: true
      macro-enabled: true
      macro-fixed-delay-ms: 3600000
      sentiment-enabled: true
      sentiment-fixed-delay-ms: 3600000
      onchain-enabled: true
      onchain-fixed-delay-ms: 3600000
    analysis-report-generation:
      enabled: true
      initial-delay-ms: 60000

external:
  alternative-me:
    base-url: https://api.alternative.me
  openai:
    enabled: false
    base-url: https://api.openai.com
    api-key: ${OPENAI_API_KEY:}
    model: gpt-5.4
    connect-timeout-millis: 5000
    read-timeout-millis: 30000
  coinmetrics:
    base-url: https://community-api.coinmetrics.io/v4
  gdelt:
    base-url: https://api.gdeltproject.org/api/v2/doc/doc
    max-records: 10
    time-span: 3days
  fred:
    base-url: https://api.stlouisfed.org
    api-key: ${FRED_API_KEY:}
    series:
      dxy-proxy: DTWEXBGS
      us10y-yield: DGS10
      usd-krw: DEXKOUS
  binance:
    base-url: https://api.binance.com
    futures-base-url: https://fapi.binance.com
