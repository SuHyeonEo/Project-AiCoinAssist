spring:
  application:
    name: batch

  datasource:
    url: jdbc:mysql://localhost:3306/coin_analysis?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

logging:
  level:
    root: info

external:
  binance:
    base-url: https://api.binance.com
